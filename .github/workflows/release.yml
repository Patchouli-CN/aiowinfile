name: Build and Publish to PyPI

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build scikit-build-core nanobind
      
      - name: Build wheel
        run: |
          python -m build --wheel --outdir dist
      
      - name: List built wheels
        shell: bash
        run: |
          echo "=== Built wheels ==="
          ls -la dist/
      
      - name: Verify wheel contents
        shell: bash
        run: |
          for wheel in dist/*.whl; do
            echo "Checking $wheel"
            if command -v unzip &> /dev/null; then
              unzip -l "$wheel" | grep -E "(_ayafileio|\.so|\.pyd)" || echo "WARNING: No extension found!"
            fi
          done
      
      - name: Install wheel and test
        shell: bash
        run: |
          python -m pip install --upgrade pip
          
          # Install the built wheel
          wheel_file=$(ls dist/*.whl | head -1)
          echo "Installing: $wheel_file"
          pip install "$wheel_file" --force-reinstall --no-deps
          
          # Test imports
          echo "=== Testing imports ==="
          python -c "
          import sys
          try:
              import ayafileio
              print('✓ ayafileio imported successfully')
              print(f'✓ Version: {getattr(ayafileio, \"__version__\", \"unknown\")}')
          except ImportError as e:
              print(f'✗ Failed to import ayafileio: {e}')
              sys.exit(1)
          "
          
          # Run tests if exists
          if [ -f test_base.py ]; then
            python test_base.py
          fi
      
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: dist/*.whl
          retention-days: 7

  publish:
    name: Publish to PyPI
    needs: build_wheels
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true
      
      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          pip install twine
          twine upload --skip-existing dist/*.whl --verbose