name: Build and Publish to PyPI

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build scikit-build-core nanobind
      
      # Linux: 使用 cibuildwheel 构建
      - name: Build wheel on Linux
        if: runner.os == 'Linux'
        run: |
          pip install cibuildwheel
          python -m cibuildwheel --output-dir dist
        env:
          CIBW_ARCHS: "x86_64"
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux2014
          CIBW_BUILD_FRONTEND: "build"
          CIBW_TEST_SKIP: "*"  # 禁用 cibuildwheel 自带测试，我们手动测
      
      # Windows/macOS: 构建 wheel
      - name: Build wheel on Windows/macOS
        if: runner.os != 'Linux'
        run: |
          python -m build --wheel --outdir dist
      
      - name: List built wheels
        shell: bash
        run: |
          echo "=== Built wheels ==="
          ls -la dist/
      
      # ============================================================
      # 关键步骤：安装 wheel 并运行测试
      # ============================================================
      - name: Install wheel and run tests
        shell: bash
        run: |
          # 找到 wheel 文件
          WHEEL=$(ls dist/*.whl | head -1)
          echo "Testing wheel: $WHEEL"
          
          # 创建虚拟环境
          python -m venv test_env
          
          # 激活虚拟环境（跨平台）
          if [ "${{ runner.os }}" = "Windows" ]; then
            source test_env/Scripts/activate
          else
            source test_env/bin/activate
          fi
          
          # 安装 wheel
          pip install "$WHEEL"
          
          # ============================================================
          # DEBUG: 查看安装后的文件结构
          # ============================================================
          echo "=== DEBUG: Python site-packages location ==="
          python -c "import site; print(site.getsitepackages())"
          
          echo "=== DEBUG: ayafileio package contents ==="
          SITE_PKG=$(python -c "import site; print(site.getsitepackages()[0])")
          echo "Site packages: $SITE_PKG"
          
          if [ -d "$SITE_PKG/ayafileio" ]; then
            echo "Contents of $SITE_PKG/ayafileio:"
            ls -la "$SITE_PKG/ayafileio/"
          else
            echo "ERROR: ayafileio directory not found in site-packages!"
            echo "Searching for ayafileio anywhere in site-packages:"
            find "$SITE_PKG" -name "*ayafileio*" -type d 2>/dev/null || echo "No ayafileio directories found"
            find "$SITE_PKG" -name "*.pyd" 2>/dev/null | head -20 || echo "No .pyd files found"
          fi
          
          echo "=== DEBUG: All .pyd files in site-packages ==="
          find "$SITE_PKG" -name "*.pyd" 2>/dev/null | head -20 || echo "No .pyd files found"
          
          # 尝试直接导入 .pyd 文件
          echo "=== DEBUG: Trying to import _ayafileio directly ==="
          python -c "import sys; print(sys.path)" || true
          python -c "import _ayafileio" 2>&1 || echo "Cannot import _ayafileio"
          
          # ============================================================
          # 正式测试
          # ============================================================
          echo "=== Testing import ==="
          python -c "import ayafileio; print('✓ Import OK')"
          
          echo "=== Running test_base.py ==="
          python test_base.py
          
          echo "=== All tests passed ==="
      
      # 上传 artifacts（只有测试通过才会执行到这里）
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: dist/*.whl
          retention-days: 7
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    needs: build_wheels
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true
      
      - name: List all collected wheels
        shell: bash
        run: |
          echo "=== Collected wheels ==="
          ls -la dist/
          echo "=== Wheel count ==="
          ls -la dist/*.whl 2>/dev/null | wc -l
      
      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          pip install --upgrade pip
          pip install twine
          echo "=== Publishing to PyPI ==="
          twine upload --skip-existing dist/*.whl --verbose