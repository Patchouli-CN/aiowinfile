name: Build and Publish to PyPI

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install cibuildwheel
        run: pip install cibuildwheel
      - name: Build wheels
        run: python build_it.py --platform auto --output dist --skip-install --yes

      - name: Install built wheel and run tests
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install dist/*.whl
          python -V
          # Run the provided test script
          python test_base.py

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: dist/*.whl
          retention-days: 7

  publish:
    name: Publish to PyPI
    needs: build_wheels
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Organize wheels
        run: |
          mkdir -p all_wheels
          find dist -name "*.whl" -exec mv {} all_wheels/ \;
      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          pip install twine
          twine upload --skip-existing all_wheels/*.whl --verbose
