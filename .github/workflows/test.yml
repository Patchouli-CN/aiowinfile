name: Build and Test

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # 允许手动触发

jobs:
  # ════════════════════════════════════════════════════════════════════════
  # Linux 测试 (Ubuntu)
  # ════════════════════════════════════════════════════════════════════════
  test-linux:
    name: "Linux (Python ${{ matrix.python-version }})"
    runs-on: ubuntu-22.04
    timeout-minutes: 15  # 整个 job 的超时时间
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    
    env:
      AYAFILEIO_DEBUG: 1
      CMAKE_BUILD_TYPE: Debug
      CMAKE_BUILD_PARALLEL_LEVEL: 2
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y liburing-dev gdb
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install nanobind scikit-build-core aiofiles
    
    - name: Build ayafileio (Debug mode)
      timeout-minutes: 5  # 单个步骤的超时时间
      run: |
        export CMAKE_ARGS="-DCMAKE_BUILD_TYPE=Debug -DENABLE_DEBUG=ON -DENABLE_VERBOSE_LOGGING=ON"
        pip install -e . -v
    
    - name: Check backend info
      timeout-minutes: 1
      run: |
        python -c "import ayafileio; print(ayafileio.get_backend_info())"

    - name: Enable core dumps
      run: ulimit -c unlimited
    
    - name: Run tests with debug
      timeout-minutes: 3  # 测试应该在 3 分钟内完成
      run: |
        python test_base.py

  # ════════════════════════════════════════════════════════════════════════
  # Windows 测试
  # ════════════════════════════════════════════════════════════════════════
  test-windows:
    name: "Windows (Python ${{ matrix.python-version }})"
    runs-on: windows-2022
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    
    env:
      AYAFILEIO_DEBUG: 1
      CMAKE_BUILD_TYPE: Debug
      CMAKE_BUILD_PARALLEL_LEVEL: 2
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install Python dependencies
      timeout-minutes: 2
      run: |
        python -m pip install --upgrade pip
        pip install nanobind scikit-build-core aiofiles
    
    - name: Build ayafileio (Debug mode)
      timeout-minutes: 5
      run: |
        $env:CMAKE_ARGS = "-DCMAKE_BUILD_TYPE=Debug -DENABLE_DEBUG=ON -DENABLE_VERBOSE_LOGGING=ON"
        pip install -e . -v
    
    - name: Check backend info
      timeout-minutes: 1
      run: |
        python -c "import ayafileio; print(ayafileio.get_backend_info())"
    
    - name: Run tests
      timeout-minutes: 3
      run: |
        python test_base.py

  # ════════════════════════════════════════════════════════════════════════
  # macOS 测试
  # ════════════════════════════════════════════════════════════════════════
  test-macos:
    name: "macOS (Python ${{ matrix.python-version }})"
    runs-on: macos-14  # Apple Silicon
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    
    env:
      AYAFILEIO_DEBUG: 1
      CMAKE_BUILD_TYPE: Debug
      CMAKE_BUILD_PARALLEL_LEVEL: 2
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install Python dependencies
      timeout-minutes: 2
      run: |
        python -m pip install --upgrade pip
        pip install nanobind scikit-build-core aiofiles
    
    - name: Build ayafileio (Debug mode)
      timeout-minutes: 5
      run: |
        export CMAKE_ARGS="-DCMAKE_BUILD_TYPE=Debug -DENABLE_DEBUG=ON -DENABLE_VERBOSE_LOGGING=ON"
        pip install -e . -v
    
    - name: Check backend info
      timeout-minutes: 1
      run: |
        python -c "import ayafileio; print(ayafileio.get_backend_info())"
    
    - name: Run tests
      timeout-minutes: 3
      run: |
        python test_base.py